<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="quiz-container">
        <section id='welcome-screen' class="quiz-section active">
            <h1 id="player-from">   
                Welcome to quiz
            </h1>
            
            <form id="player-form">
                <div class="form-group">
                    <label for="player-name">Type your name</label>
                    <input type='text' id="player-name" name="player-name" required>

                </div>
                <div class="player-group-select" >
                    <select name="theme" id="questions-theme-select" class="btn" required>
                    <option value="html" >HTML</option>
                    <option value="css" selected>CSS</option>
                    <option value="js">JavaScript</option>

                </select>

                <select name="Limit" id="questions-limit-select" class="btn" required>
                    <option value="10">Get 10 questions</option>
                    <option value="20" selected>Get 20 questions</option>
                    <option value="50" >Get 50 questions</option>
                    <option value="100">Get 100 questions</option>

                </select>
                
                <button type="submit" id="start-button" class="btn ">
                    start game
                </button>
                <div id="loading-spinner" class="spinner hidden   "></div>
                <button id="requiest-question-btn" class="btn hidden">Restart quiestions</button>

                </div>
                

                
                
            </form>

        </section>


        <!-- QUIZ QUESTION SCREEN -->
        <section id="question-screen" class="quiz-section ">

            <div class="quiz-header">
                <div class="player-info">

                    <span>Player:
                        <span id="current-player">PlayerName </span>
                    </span>
                </div>
                <div class="quiz-progress">
                    <span>
                        Question: <span id="current-question">1</span>
                        from <span id="total-questions">15</span>
                    </span>
                </div>
                <div class="quiz-progress">
                    <span>Time: <span id="timer-seconds">15</span> sec</span>
                    <span>
                        Score: <span id="current-score">0</span>
                    </span>
                </div>
            </div>

            <div id="question-container">
                    <h2 id="question-text">
                        Some question
                    </h2>
                   
                        <div id="options-container">
                            <!-- TEMPLATE WELL BE GENERATED -->
                        </div>
                        
                        
                        
                        <div id="feedback-container"                    class="hidden ">
                            <p id="feedback-text">Some halper text</p>
                            <button id="next-button" class="btn">Next Question</button>
                        </div>
                    
                </div>

                
        </section>


        <!-- RESULT SCREEN -->
        <section id="result-screen" class="quiz-section ">
            <h2>Results of quiz</h2>
            <div class="final-result">
                <p>
                    Congratulations, <span id="result-playerName"> Player1</span> !

                </p>
                <P>
                    Your results:
                    <span id="result-score"> 0
                        <span>from</span>
                        <span id="result-total">10</span>
                    </span>

                </P>

                <p id="result-precentage">50%</p>
            </div>

            <div id="result-actions">
                <button id="restart-button" class="btn">Restart</button>
            </div>
        </section>

    </div>

    <template id="option-template">
        <div class="option" >
            <input type="radio"  id="" >
            <label for="">option 1</label>
        </div>
    </template>



    <script src="index.js"></script>
</body>

</html>
